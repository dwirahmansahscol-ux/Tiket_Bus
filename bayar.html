<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan & Pembayaran - Tiket Bus </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><h2>Tiket Bus </h2></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Beranda</a></li>
                <li class="nav-item"><a href="tentang.html" class="nav-link">Tentang</a></li>
                <li class="nav-item"><a href="katalog.html" class="nav-link">Katalog</a></li>
                <li class="nav-item"><a href="bayar.html" class="nav-link active">Bayar</a></li>
                <li class="nav-item"><a href="kontak.html" class="nav-link">Kontak</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main class="section">
        <!-- Wrapper Utama Pemesanan menggunakan Flexbox (Kiri Gambar, Kanan Form) -->
        <div class="pemesanan-wrapper" style="display: flex; flex-wrap: wrap; gap: 2.5rem; max-width: 1100px; margin: 0 auto; align-items: stretch;">
            
            <!-- BAGIAN KIRI: Gambar Pendukung Perjalanan Bus -->
            <div class="pemesanan-image-box" style="flex: 1; min-width: 320px; display: flex; justify-content: center; align-items: center;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdINlUSmTUGG7vSXW5tZtBsy3G_mG4a3M_GX_lVbQaqQ&s=10" 
                     alt="[Perjalanan Nyaman BusTicket]" 
                     style="width: 100%; height: 100%; min-height: 400px; max-height: 550px; object-fit: cover; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.08);">
            </div>

            <!-- BAGIAN KANAN: Formulir Pemesanan Tiket -->
            <div class="card" style="flex: 1; min-width: 320px; padding: 2.5rem; background: white; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 0; display: flex; flex-direction: column; justify-content: center;">
                <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.75rem; text-align: center; color: #0f172a;">Formulir Pemesanan Tiket</h2>
                <p style="text-align: center; margin-bottom: 2rem; color: #64748b; font-size: 0.9rem; line-height: 1.5;">
                    Isi data diri Anda di bawah ini untuk memesan kursi perjalanan secara aman & cepat.
                </p>

                <form action="#" method="POST" onsubmit="alert('Pemesanan Berhasil! Silakan periksa email Anda untuk instruksi pembayaran.'); return false;">
                    <!-- Input Nama -->
                    <div class="form-group" style="margin-bottom: 1.25rem; display: flex; flex-direction: column;">
                        <label for="nama" style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.85rem; color: #0f172a;">Nama Lengkap Sesuai KTP</label>
                        <input type="text" id="nama" required class="form-input" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none;" placeholder="Contoh: Paijo">
                    </div>
                    
                    <!-- Input Email -->
                    <div class="form-group" style="margin-bottom: 1.25rem; display: flex; flex-direction: column;">
                        <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.85rem; color: #0f172a;">Alamat Email</label>
                        <input type="email" id="email" required class="form-input" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none;" placeholder="paijo@gmail.com">
                    </div>

                    <!-- Input Rute Perjalanan -->
                    <div class="form-group" style="margin-bottom: 1.25rem; display: flex; flex-direction: column;">
                        <label for="rute" style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.85rem; color: #0f172a;">Pilih Rute Perjalanan</label>
                        <select id="rute" required class="form-input" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none; background-color: white;">
                            <option value="">-- Pilih Rute --</option>
                            <option value="jkt-bdg">VIP. Blitang - Jakarta - Bandung (Rp 1.000.000)</option>
                            <option value="jkt-yog">VIP. Blitang - jkarta - Yogyakarta (Rp 1.250.000)</option>
                            <option value="sby-bali">VIP. Blitang - jkarta -Surabaya - Bali (Rp 1.800.000)</option>
                            <option value="jkt-bdg">PAS.  Blitang - Jakarta - Bandung (Rp 800.000)</option>
                            <option value="jkt-yog">PAS.  Blitang - Jakarta - Yogyakarta (Rp 900.000)</option>
                            <option value="sby-bali">PAS.  Blitang -Jakarta - yogyakarta - bandung  (Rp 1.000.000)</option>
                            <option value="jkt-bdg">HEMAT. Blitang -Jakarta - Bandung (Rp 200.000)</option>
                            <option value="jkt-yog">HEMAT. Blitang -Jakarta - Yogyakarta (Rp 400.000)</option>
                            <option value="sby-bali">HEMAT. Jakarta - yogyakarta - bandung (Rp 450.000)</option>
                        </select>
                    </div>

                    <!-- Input Metode Pembayaran -->
                    <div class="form-group" style="margin-bottom: 1.5rem; display: flex; flex-direction: column;">
                        <label for="metode" style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.85rem; color: #0f172a;">Metode Pembayaran</label>
                        <select id="metode" required class="form-input" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none; background-color: white;">
                            <option value="transfer">Transfer Bank (BCA/Mandiri/BRI)</option>
                            <option value="ewallet">E-Wallet (Dana/OVO/GoPay/LinkAja)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; background-color: var(--success-color); color: white; padding: 0.85rem; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; transition: background-color 0.2s;">Konfirmasi Pemesanan</button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 BusTicket. Semua Hak Dilindungi.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
